services:
  postgres-db1:
    image: postgres:15
    container_name: postgres-db1
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db1
    volumes:
      - postgres_db1_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d app_db1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - db1_network

  postgres-db2:
    image: postgres:15
    container_name: postgres-db2
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db2
    volumes:
      - postgres_db2_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d app_db2"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - db2_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    depends_on:
      postgres-db1:
        condition: service_healthy
      postgres-db2:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - db1_network
      - db2_network

  flyway-db1:
    image: flyway/flyway:10.10.0
    container_name: flyway-db1
    volumes:
      - ./migrations/db1:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres-db1:5432/app_db1
      FLYWAY_USER: admin
      FLYWAY_PASSWORD: password
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_CONNECT_RETRIES: 10
    depends_on:
      postgres-db1:
        condition: service_healthy
    networks:
      - db1_network
    command: ["migrate"]

  flyway-db2:
    image: flyway/flyway:10.10.0
    container_name: flyway-db2
    volumes:
      - ./migrations/db2:/flyway/sql:ro
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres-db2:5432/app_db2
      FLYWAY_USER: admin
      FLYWAY_PASSWORD: password
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_CONNECT_RETRIES: 10
    depends_on:
      postgres-db2:
        condition: service_healthy
    networks:
      - db2_network
    command: ["migrate"]

  app:
    build: .
    container_name: seminar2-app
    environment:
      DB1_URL: jdbc:postgresql://postgres-db1:5432/app_db1
      DB1_USER: admin
      DB1_PASSWORD: password
      DB2_URL: jdbc:postgresql://postgres-db2:5432/app_db2
      DB2_USER: admin
      DB2_PASSWORD: password
    depends_on:
      flyway-db1:
        condition: service_completed_successfully
      flyway-db2:
        condition: service_completed_successfully
    networks:
      - db1_network
      - db2_network

volumes:
  postgres_db1_data:
  postgres_db2_data:
  pgadmin_data:

networks:
  db1_network:
    driver: bridge
  db2_network:
    driver: bridge
