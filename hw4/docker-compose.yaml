services:
  postgres:
    image: postgres:15
    container_name: seminar4_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15434:5432"
    networks:
      - pg_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: seminar4_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pg_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  pg_network:
    driver: bridge
